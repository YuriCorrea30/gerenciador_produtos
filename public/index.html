<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciador de Produtos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card header-card">
      <h1>Gerenciador de Produtos</h1>
      <p>CRUD com Node.js, Fastify, PostgreSQL e Front-End</p>
    </section>

    <section class="card">
      <h2 id="titulo-formulario">Cadastrar Produto</h2>
      <form id="form-produto">
        <input type="hidden" id="produto-id" />

        <label>Nome do produto</label>
        <input type="text" id="nome" placeholder="Ex: Mouse Gamer" required />

        <label>Preço</label>
        <input type="number" id="preco" placeholder="Ex: 89.90" step="0.01" required />

        <label>Quantidade</label>
        <input type="number" id="quantidade" placeholder="Ex: 15" required />

        <label>Categoria</label>
        <input type="text" id="categoria" placeholder="Ex: Informática" />

        <div class="acoes-formulario">
          <button type="submit">Salvar Produto</button>
          <button type="button" id="btn-cancelar" class="secundario">Cancelar edição</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Produtos Cadastrados</h2>
      <p id="mensagem"></p>

      <input type="text" id="campo-busca" placeholder="Pesquisar produto por nome..." />

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Quantidade</th>
            <th>Categoria</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista-produtos"></tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
